# ============================================
# DATABASE CONNECTION
# Change these 3 lines to match your own MySQL setup.
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/budget_butler_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# ============================================
# HIBERNATE / JPA
# "update" means: automatically create/update tables based on our @Entity classes.
# This is perfect for learning and development. In a real production app you would
# use proper migration scripts instead.
# ============================================
spring.jpa.hibernate.ddl-auto=update

# Prints the SQL queries in the console, so you can see exactly what's happening.
# Great for learning! Set to false later if it gets too noisy.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# SERVER
# ============================================
server.port=8080

# Allows CSV bank statement uploads up to 5MB (Spring Boot's default is only 1MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ============================================
# JWT
# jwt.secret must be at least 32 characters (used to sign tokens - keep this private in real apps!)
# jwt.expiration-ms = how long a token stays valid before the user must log in again (24 hours here)
# ============================================
jwt.secret=change-this-to-a-long-random-secret-value-before-going-to-production
jwt.expiration-ms=86400000

# ============================================
# STRIPE
# Get these from your Stripe Dashboard (https://dashboard.stripe.com):
# - secret-key: Developers -> API keys -> Secret key (starts with sk_test_... while testing)
# - price-id-*: Products -> create 4 recurring Prices (Plus monthly, Plus annual,
#   Premium monthly, Premium annual) -> copy each Price ID (starts with price_...)
#     Suggested prices: Plus $4.99/mo or $47.99/yr, Premium $7.99/mo or $76.99/yr (~20% off annually)
# - webhook-secret: Developers -> Webhooks -> add endpoint -> copy the signing secret (starts with whsec_...)
#   While developing locally, use the Stripe CLI: `stripe listen --forward-to localhost:8080/api/subscription/webhook`
#   It will print a webhook secret for you to paste here.
# ============================================
stripe.secret-key=sk_test_replace_with_your_own_key
stripe.price-id-plus-monthly=price_replace_plus_monthly
stripe.price-id-plus-annual=price_replace_plus_annual
stripe.price-id-premium-monthly=price_replace_premium_monthly
stripe.price-id-premium-annual=price_replace_premium_annual
stripe.webhook-secret=whsec_replace_with_your_own_webhook_secret

# The Angular app's URL - used to build Stripe's success/cancel redirect links
app.frontend-url=http://localhost:4200

# Which origin is allowed to call this API (CORS). In production, set this via the
# CORS_ALLOWED_ORIGIN environment variable to your deployed frontend's URL.
app.cors-allowed-origin=http://localhost:4200

# ============================================
# EMAIL (for password reset + email verification)
# By default, mail sending is DISABLED - links are printed to the console instead, so you
# can test the full flow with zero setup. To send REAL emails, set app.mail-enabled=true
# and fill in spring.mail.* below.
#
# Free option: a Gmail account with an "App Password" (NOT your normal Gmail password):
#   Google Account -> Security -> 2-Step Verification (must be on) -> App Passwords -> generate one
# ============================================
app.mail-enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-16-character-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
