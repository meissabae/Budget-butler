<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Budget Butler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- PWA: makes the app installable with its own icon, splash screen, and standalone window -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1B1F3B">

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">

  <!-- iOS-specific: lets "Add to Home Screen" open in a standalone window instead of Safari's browser chrome -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Budget Butler">

  <!-- Two Google Fonts: Fredoka for playful headings, Inter for readable body text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
