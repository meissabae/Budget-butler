<div class="auth-wrapper">
  <form class="auth-card" (ngSubmit)="submit()" *ngIf="!success">
    <h2>🔒 Set a new password</h2>

    <label>New password</label>
    <input type="password" [(ngModel)]="newPassword" name="newPassword" required placeholder="At least 6 characters">

    <p class="error" *ngIf="message">{{ message }}</p>

    <button type="submit" class="btn-primary" [disabled]="loading || !token">
      {{ loading ? 'Updating...' : 'Update password' }}
    </button>

    <p class="switch"><a routerLink="/login">Back to login</a></p>
  </form>

  <div class="auth-card" *ngIf="success">
    <h2>✅ Password updated</h2>
    <p class="subtitle">Redirecting you to login...</p>
  </div>
</div>
