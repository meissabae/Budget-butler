<div class="auth-wrapper">
  <form class="auth-card" (ngSubmit)="submit()" *ngIf="!message">
    <h2>🔑 Forgot your password?</h2>
    <p class="subtitle">Enter your email and we'll send you a reset link.</p>

    <label>Email</label>
    <input type="email" [(ngModel)]="email" name="email" required placeholder="you@example.com">

    <button type="submit" class="btn-primary" [disabled]="loading">
      {{ loading ? 'Sending...' : 'Send reset link' }}
    </button>

    <p class="switch"><a routerLink="/login">Back to login</a></p>
  </form>

  <div class="auth-card" *ngIf="message">
    <h2>📬 Check your email</h2>
    <p class="subtitle">{{ message }}</p>
    <p class="switch"><a routerLink="/login">Back to login</a></p>
  </div>
</div>
