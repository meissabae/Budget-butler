<div class="auth-wrapper">
  <form class="auth-card" (ngSubmit)="submit()">
    <h2>🎩 Welcome back</h2>
    <p class="subtitle">Log in to see what Budget Butler has to say about your spending.</p>

    <label>Email</label>
    <input type="email" [(ngModel)]="email" name="email" required placeholder="you@example.com">

    <label>Password</label>
    <input type="password" [(ngModel)]="password" name="password" required placeholder="••••••••">

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button type="submit" class="btn-primary" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Log in' }}
    </button>

    <p class="switch"><a routerLink="/forgot-password">Forgot your password?</a></p>
    <p class="switch">No account yet? <a routerLink="/register">Create one</a></p>
  </form>
</div>
